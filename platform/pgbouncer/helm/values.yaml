image:
  repository: bitnamilegacy/pgbouncer
  tag: "1.24.1-debian-12-r10"

postgresql:
  host: platform-postgresql.platform-postgresql.svc.cluster.local
  port: 5432
  database: eventhub_central
  username: platform_admin
  password: changeme-in-production

pooling:
  poolMode: transaction
  defaultPoolSize: 20
  maxClientConn: 200
  maxDbConnections: 50

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
