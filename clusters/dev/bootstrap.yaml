apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dev-bootstrap
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/Shubham-Kumar1/platform-advanced.git'
    targetRevision: HEAD
    path: clusters/dev/apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
