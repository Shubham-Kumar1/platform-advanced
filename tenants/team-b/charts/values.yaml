replicaCount: 2
image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

namespace:
  team: devops
  
service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilization: 100

mysql:
  image: mysql:8.0
  storageSize: 40Gi
  rootPassword: changeme-mysql-root
  database: events

centralDb:
  secretName: central-db-credentials
