tenant:
  name: alpha
  displayName: "Acme Corp"
  planTier: pro

namespace:
  labels:
    team: engineering
    environment: production

resourceQuota:
  cpu: "8"
  memory: 16Gi
  pods: "40"
  services: "20"
  persistentvolumeclaims: "10"

eventService:
  replicaCount: 2
  mysql:
    storageSize: 10Gi

liveDashboard:
  replicaCount: 2
  mongodb:
    storageSize: 10Gi

analyticsWorker:
  replicaCount: 1
  workerConcurrency: 4
  redis:
    storageSize: 2Gi

centralDb:
  host: pgbouncer.platform-services.svc.cluster.local
  port: 5432
  database: eventhub_central
